<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="pinkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FBCFE8" />
      <stop offset="50%" stop-color="#F472B6" />
      <stop offset="100%" stop-color="#DB2777" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#DB2777" flood-opacity="0.3" />
    </filter>
  </defs>
  <!-- Background Circle with subtle glow -->
  <circle cx="256" cy="256" r="230" fill="url(#pinkGrad)" filter="url(#shadow)" />
  
  <!-- Stylized Cherry Blossom / Flower in Center -->
  <g fill="white" transform="translate(256, 256)">
    <!-- Petal 1 (Top) -->
    <path d="M 0 0 C -40 -80 -25 -140 0 -170 C 25 -140 40 -80 0 0" />
    <!-- Petal 2 (Right-Top) -->
    <path d="M 0 0 C 40 -80 78 -54 110 -30 C 78 12 24 50 0 0" transform="rotate(72)" />
    <!-- Petal 3 (Right-Bottom) -->
    <path d="M 0 0 C 40 -80 78 -54 110 -30 C 78 12 24 50 0 0" transform="rotate(144)" />
    <!-- Petal 4 (Left-Bottom) -->
    <path d="M 0 0 C 40 -80 78 -54 110 -30 C 78 12 24 50 0 0" transform="rotate(216)" />
    <!-- Petal 5 (Left-Top) -->
    <path d="M 0 0 C 40 -80 78 -54 110 -30 C 78 12 24 50 0 0" transform="rotate(288)" />
    
    <!-- Flower Center Core -->
    <circle cx="0" cy="0" r="25" fill="#FBCFE8" />
    <circle cx="0" cy="0" r="15" fill="#DB2777" />
    
    <!-- Small accent dots inside flower -->
    <circle cx="0" cy="-45" r="4" fill="#FCE7F3" />
    <circle cx="43" cy="-14" r="4" fill="#FCE7F3" />
    <circle cx="26" cy="36" r="4" fill="#FCE7F3" />
    <circle cx="-26" cy="36" r="4" fill="#FCE7F3" />
    <circle cx="-43" cy="-14" r="4" fill="#FCE7F3" />
  </g>
</svg>
